name: Cost Janitor

on:
  pull_request:
    branches: [main]

jobs:
  cost-janitor:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      # ── 1. Code checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python setup ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Terraform setup ──
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # ── 4. Install tflocal + janitor deps ──
      - name: Install dependencies
        run: |
          pip install terraform-local
          pip install -r janitor/requirements.txt

      # ── 5. Wait for LocalStack to be ready ──
      - name: Wait for LocalStack
        run: |
          echo "Waiting for LocalStack..."
          for i in {1..20}; do
            curl -s http://localhost:4566/_localstack/health && break
            sleep 3
          done

      # ── 6. Terraform apply ──
      - name: Terraform Init + Apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          tflocal init
          tflocal apply -auto-approve

      # ── 7. Run Cost Janitor ──
      - name: Run Cost Janitor (dry-run)
        id: janitor
        working-directory: janitor
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          python janitor.py --dry-run || true

      # ── 8. Upload artifacts ──
      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-janitor-report
          path: |
            janitor/report.json
            janitor/summary.md

      # ── 9. Post PR comment if orphans found ──
      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'janitor/summary.md';
            
            if (!fs.existsSync(summaryPath)) {
              console.log('No summary.md found, skipping comment.');
              return;
            }
            
            const summary = fs.readFileSync(summaryPath, 'utf8');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });